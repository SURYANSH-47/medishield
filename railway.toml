# railway.toml
# ============
# Railway deployment configuration for MediShield AI Backend (FastAPI)
#
# Frontend (Next.js) is deployed separately on Vercel.
# This file configures the Python/FastAPI backend service on Railway.

[build]
builder = "nixpacks"

[deploy]
# Railway injects $PORT automatically — never hardcode 8000 here
startCommand = "uvicorn ml.api:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
